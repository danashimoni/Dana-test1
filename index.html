<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Viz.ai Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ─── FIGMA TOKENS ── Component (Mapped) · node 9365-57140 ─── */
:root {
  --surface-page:      #1a1d24;
  --surface-1:         #242833;
  --surface-2:         #2c3039;
  --surface-3:         #3c4455;
  --surface-sidebar:   #0f1117;

  --text-primary:      #f3f4f5;
  --text-secondary:    #c0c0c9;
  --text-tertiary:     #808496;
  --text-action:       #3485f7;
  --text-action-hover: #0066ff;
  --text-action-sel:   #99c2ff;
  --text-success:      #32ab45;
  --text-error:        #ff586b;
  --text-warning:      #f6ad3f;

  --icon-secondary:    #c0c0c9;
  --icon-tertiary:     #a3a6b5;

  --action-primary:    #3485f7;
  --action-hover:      #0066ff;
  --action-selected:   #99c2ff;
  --action-destructive:#ff586b;
  --action-destr-hover:#ff453a;
  --action-disabled:   #5a606d;
  --action-level-1:    rgba(255,255,255,0.05);
  --action-level-2:    rgba(255,255,255,0.10);
  --action-level-3:    rgba(255,255,255,0.20);

  --border-0:          rgba(255,255,255,0.10);
  --border-1:          rgba(255,255,255,0.20);
  --border-2:          rgba(255,255,255,0.30);
  --border-3:          rgba(255,255,255,0.40);
  --border-default:    #a3a6b5;
  --border-focus:      #5ca3ff;
  --border-error:      rgba(255,88,107,0.40);
  --border-warning:    rgba(246,173,63,0.40);

  --color-success:     #32ab45;
  --color-error:       #ff586b;
  --color-warning:     #f6ad3f;
  --color-info:        #3485f7;

  /* Typography */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;

  /* Spacing */
  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px;
  --s6: 32px; --s7: 48px; --s8: 64px; --s9: 96px;

  /* Motion */
  --ease: 150ms ease;
  --ease-out: 200ms ease-out;
}

/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:var(--font);background:var(--surface-page);color:var(--text-primary);line-height:1.6;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
a{color:var(--text-action);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-1);border-radius:2px}
::selection{background:rgba(52,133,247,.25)}

/* ─── SHELL ─── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ─── SIDEBAR ─── */
.sidebar{
  width:248px;min-width:248px;
  background:var(--surface-sidebar);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  border-right:1px solid rgba(255,255,255,0.06);
  transition:width .2s ease,min-width .2s ease;
}
.sidebar.collapsed{width:0;min-width:0;border-right:none}

.sb-wordmark{
  display:flex;align-items:center;gap:12px;
  padding:24px 22px 22px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.sb-logo-mark{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.sb-logo-img{width:32px;height:auto;display:block}
.sb-logo-divider{
  width:1px;height:28px;background:rgba(255,255,255,.1);flex-shrink:0;
}
.sb-logo-text{display:flex;flex-direction:column;gap:2px}
.sb-logo-name{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.2;letter-spacing:-.01em}
.sb-logo-sub{font-size:9px;font-weight:500;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.12em;line-height:1.2}

.sb-nav{flex:1;padding:20px 0 32px;overflow-y:auto}
.sb-section{margin-bottom:28px}
.sb-section-label{
  font-size:9px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-tertiary);padding:0 24px 8px;line-height:1;
}
.sb-list{list-style:none}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 24px;
  font-size:13px;color:var(--text-secondary);
  cursor:pointer;border:none;background:none;font-family:var(--font);
  width:100%;text-align:left;
  transition:color var(--ease),background var(--ease);
  position:relative;white-space:nowrap;
  border-left:2px solid transparent;
}
.sb-item:hover{color:var(--text-primary);background:rgba(255,255,255,.04)}
.sb-item.active{color:var(--text-primary);border-left-color:var(--action-primary);background:rgba(52,133,247,.08);font-weight:500}
.sb-item-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
.sb-item.active .sb-item-dot{opacity:1;background:var(--action-primary)}

.sb-footer{
  padding:16px 24px;
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
}
.sb-figma-link{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--text-tertiary);
  transition:color var(--ease);
}
.sb-figma-link:hover{color:var(--text-secondary)}
.sb-version{font-family:var(--mono);font-size:10px;color:var(--text-tertiary)}

/* ─── MAIN ─── */
.main{flex:1;overflow-y:auto;background:var(--surface-page);min-width:0}
.toggle-btn{
  position:fixed;top:20px;left:12px;z-index:99;
  width:32px;height:32px;border-radius:6px;
  background:var(--surface-sidebar);
  border:1px solid rgba(255,255,255,.08);
  display:none;align-items:center;justify-content:center;
  color:var(--text-secondary);cursor:pointer;
  transition:background var(--ease);
}

/* ─── PAGE HERO ─── */
.page-hero{
  padding:var(--s8) var(--s8) var(--s7);
  border-bottom:1px solid var(--border-0);
  max-width:1200px;
}
.page-hero-eyebrow{
  font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  color:var(--action-primary);margin-bottom:var(--s3);
}
.page-hero-title{
  font-size:52px;font-weight:700;letter-spacing:-.03em;line-height:1.05;
  color:var(--text-primary);margin-bottom:var(--s5);
}
.page-hero-desc{
  font-size:16px;color:var(--text-secondary);line-height:1.7;
  max-width:640px;font-weight:400;
}
.page-hero-meta{
  display:flex;gap:var(--s5);margin-top:var(--s6);
  border-top:1px solid var(--border-0);padding-top:var(--s5);
}
.page-hero-meta-item{display:flex;flex-direction:column;gap:4px}
.page-hero-meta-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary)}
.page-hero-meta-val{font-size:13px;color:var(--text-secondary)}

/* ─── PAGE CONTENT ─── */
.page-content{max-width:1200px;padding:var(--s7) var(--s8) var(--s9)}

/* ─── SECTION ─── */
.ds-section{margin-bottom:var(--s9)}
.ds-section + .ds-section{border-top:1px solid var(--border-0);padding-top:var(--s7)}
.ds-section-header{margin-bottom:var(--s6)}
.ds-section-title{
  font-size:22px;font-weight:600;letter-spacing:-.02em;
  color:var(--text-primary);margin-bottom:var(--s3);
}
.ds-section-desc{font-size:14px;color:var(--text-secondary);line-height:1.65;max-width:580px}

/* ─── COLOR GRID ─── */
.color-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:2px;
  border-radius:10px;overflow:hidden;
}
.color-tile{
  position:relative;padding:0;border:none;background:none;
  cursor:pointer;text-align:left;
  display:flex;flex-direction:column;
}
.color-tile-swatch{
  height:96px;width:100%;
  transition:transform var(--ease);
}
.color-tile:hover .color-tile-swatch{transform:scale(1.02)}
.color-tile-info{
  padding:10px 12px 12px;
  background:var(--surface-1);
}
.color-tile-name{font-size:12px;font-weight:600;color:var(--text-primary);line-height:1.3;margin-bottom:2px}
.color-tile-hex{font-family:var(--mono);font-size:11px;color:var(--text-tertiary);display:block;margin-bottom:3px}
.color-tile-token{font-family:var(--mono);font-size:10px;color:var(--action-primary);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-tile-copy{
  position:absolute;top:8px;right:8px;
  font-size:10px;font-weight:500;
  background:rgba(0,0,0,.6);color:white;
  padding:3px 7px;border-radius:4px;
  opacity:0;transition:opacity var(--ease);
}
.color-tile:hover .color-tile-copy{opacity:1}

/* Alpha swatch checker */
.alpha-bg{
  background-image:
    linear-gradient(45deg,#666 25%,transparent 25%),
    linear-gradient(-45deg,#666 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#666 75%),
    linear-gradient(-45deg,transparent 75%,#666 75%);
  background-size:10px 10px;
  background-position:0 0,0 5px,5px -5px,-5px 0;
  background-color:#444;
}

/* ─── PREVIEW CANVAS ─── */
.preview-wrap{border-radius:10px;overflow:hidden;border:1px solid var(--border-0)}
.preview-bar{
  display:flex;align-items:center;gap:0;
  background:var(--surface-1);border-bottom:1px solid var(--border-0);
}
.preview-tab{
  padding:10px 18px;font-size:12px;font-weight:500;
  color:var(--text-tertiary);background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;transition:all var(--ease);margin-bottom:-1px;
  font-family:var(--font);
}
.preview-tab:hover{color:var(--text-secondary)}
.preview-tab.active{color:var(--text-primary);border-bottom-color:var(--action-primary)}
.preview-canvas{
  background:var(--surface-page);
  padding:var(--s7) var(--s6);
  display:flex;flex-wrap:wrap;gap:var(--s4);align-items:center;min-height:96px;
}
.preview-canvas.dark{background:var(--surface-2)}

/* ─── CODE BLOCK ─── */
.code-block{background:#0d0f14;border-radius:8px;overflow:hidden;margin:0}
.code-block-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.07);
}
.code-block-lang{
  font-family:var(--mono);font-size:10px;font-weight:500;
  color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.08em;
}
.code-copy-btn{
  font-size:11px;font-family:var(--font);color:var(--text-tertiary);
  padding:3px 10px;border:1px solid rgba(255,255,255,.12);border-radius:4px;
  cursor:pointer;background:transparent;
  transition:all var(--ease);
}
.code-copy-btn:hover{color:var(--text-primary);border-color:var(--border-2)}
.code-copy-btn.done{color:var(--color-success);border-color:var(--color-success)}
.code-pre{padding:20px;overflow-x:auto;margin:0}
.code-pre code{
  font-family:var(--mono);font-size:12.5px;line-height:1.75;
  color:#c9d1d9;white-space:pre;display:block;
}

/* ─── PROPS TABLE ─── */
.props-table-wrap{border-radius:8px;overflow:hidden;border:1px solid var(--border-0)}
table{width:100%;border-collapse:collapse}
thead th{
  padding:10px 16px;text-align:left;
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-tertiary);background:var(--surface-1);
  border-bottom:1px solid var(--border-0);white-space:nowrap;
}
tbody td{
  padding:11px 16px;border-bottom:1px solid var(--border-0);
  font-size:13px;color:var(--text-secondary);vertical-align:top;line-height:1.5;
}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
code.prop-name{font-family:var(--mono);font-size:12px;color:var(--action-primary)}
code.prop-type{font-family:var(--mono);font-size:12px;color:#79c0ff}
code.prop-def{font-family:var(--mono);font-size:12px;color:var(--text-tertiary)}

/* ─── SPEC ROW (label + visual bar) ─── */
.spec-row{
  display:grid;grid-template-columns:200px 1fr;
  align-items:center;gap:var(--s5);padding:12px 0;
  border-bottom:1px solid var(--border-0);
}
.spec-row:first-child{border-top:1px solid var(--border-0)}
.spec-meta{display:flex;flex-direction:column;gap:2px}
.spec-token{font-family:var(--mono);font-size:11px;color:var(--action-primary)}
.spec-val{font-family:var(--mono);font-size:10px;color:var(--text-tertiary)}

/* ─── DO / DON'T ─── */
.dodont{display:grid;grid-template-columns:1fr 1fr;gap:2px;border-radius:8px;overflow:hidden}
.do-card{background:rgba(50,171,69,.08);border:1px solid rgba(50,171,69,.25);border-radius:8px;padding:var(--s5) var(--s6)}
.dont-card{background:rgba(255,88,107,.08);border:1px solid rgba(255,88,107,.25);border-radius:8px;padding:var(--s5) var(--s6)}
.dodont-head{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--s4)}
.do-card .dodont-head{color:var(--color-success)}
.dont-card .dodont-head{color:var(--color-error)}
.dodont-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.dodont-list li{font-size:13px;color:var(--text-secondary);line-height:1.5;padding-left:14px;position:relative}
.dodont-list li::before{content:'–';position:absolute;left:0;color:var(--text-tertiary)}

/* ─── PLATFORM NAV ─── */
.sb-platform-header{
  display:flex;align-items:center;gap:9px;
  padding:10px 16px 6px;
  margin:0 0 2px;
  position:relative;
}
.sb-platform-header::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:2px;height:20px;border-radius:0 2px 2px 0;
}
.platform-web .sb-platform-header::before{background:var(--action-primary)}
.platform-ios .sb-platform-header::before{background:#a855f7}
.platform-android .sb-platform-header::before{background:#22c55e}

.sb-platform-icon{
  width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.platform-web .sb-platform-icon{background:rgba(52,133,247,.15)}
.platform-ios .sb-platform-icon{background:rgba(168,85,247,.15)}
.platform-android .sb-platform-icon{background:rgba(34,197,94,.15)}

.sb-platform-name{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.platform-web .sb-platform-name{color:var(--action-primary)}
.platform-ios .sb-platform-name{color:#a855f7}
.platform-android .sb-platform-name{color:#22c55e}

.sb-platform-toggle{
  margin-left:auto;width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  color:var(--text-tertiary);cursor:pointer;border-radius:3px;
  transition:color var(--ease),background var(--ease),transform var(--ease);
  flex-shrink:0;
}
.sb-platform-toggle:hover{color:var(--text-secondary);background:rgba(255,255,255,.06)}
.sb-platform-toggle.collapsed{transform:rotate(-90deg)}

.sb-sub-label{
  font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.2);padding:8px 24px 3px 36px;
}
.sb-item.sub{padding-left:36px;font-size:12px}
.sb-item.sub .sb-item-dot{width:3px;height:3px}
.sb-platform-divider{height:1px;background:rgba(255,255,255,.05);margin:10px 16px}

/* ─── STATUS BADGES ─── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:500;border-radius:999px;
  white-space:nowrap;padding:0 8px;height:22px;border:1px solid transparent;
}
.badge.neutral{background:rgba(255,255,255,.08);color:var(--text-secondary);border-color:var(--border-0)}
.badge.info{background:rgba(52,133,247,.12);color:#99c2ff;border-color:rgba(52,133,247,.3)}
.badge.success{background:rgba(50,171,69,.12);color:var(--color-success);border-color:rgba(50,171,69,.3)}
.badge.warning{background:rgba(246,173,63,.12);color:var(--color-warning);border-color:rgba(246,173,63,.3)}
.badge.error{background:rgba(255,88,107,.12);color:var(--color-error);border-color:rgba(255,88,107,.3)}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  font-family:var(--font);font-size:14px;font-weight:400;line-height:18px;
  border:1px solid transparent;border-radius:4px;cursor:pointer;
  transition:background var(--ease),border-color var(--ease),box-shadow var(--ease);
  white-space:nowrap;outline:none;user-select:none;
}
.btn:focus-visible{box-shadow:0 0 0 2px var(--border-focus)}
.btn.xs{height:20px;padding:0 6px;font-size:12px}
.btn.sm{height:24px;padding:0 8px;font-size:13px}
.btn.md{height:32px;padding:0 10px}
.btn.lg{height:40px;padding:0 14px}
.btn.primary{background:var(--action-primary);color:#fff}
.btn.primary:hover{background:var(--action-hover)}
.btn.primary:active{background:var(--action-hover);border-color:var(--border-focus)}
.btn.secondary{background:transparent;color:var(--text-primary);border-color:var(--border-2)}
.btn.secondary:hover{border-color:var(--border-default)}
.btn.tertiary{background:var(--action-level-1);color:var(--text-primary)}
.btn.tertiary:hover{background:var(--action-level-2)}
.btn.ghost{background:transparent;color:var(--text-primary)}
.btn.ghost:hover{background:var(--action-level-2)}
.btn.danger{background:var(--action-destructive);color:#fff}
.btn.danger:hover{background:var(--action-destr-hover)}
.btn.primary:disabled,.btn.danger:disabled{background:var(--action-disabled);color:rgba(255,255,255,.4);cursor:not-allowed;pointer-events:none}
.btn.secondary:disabled,.btn.ghost:disabled,.btn.tertiary:disabled{opacity:.38;cursor:not-allowed;pointer-events:none}
.btn-spin{width:12px;height:12px;border:1.5px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── INPUT ─── */
.field{display:flex;flex-direction:column;gap:0;width:100%}
.field-label{font-size:12px;font-weight:500;color:var(--text-secondary);padding:0 0 5px 1px;letter-spacing:-.01em}
.input-wrap{
  display:flex;align-items:center;gap:6px;
  background:transparent;
  border:1px solid var(--border-2);border-radius:4px 4px 0 0;
  transition:border-color var(--ease);
}
.input-wrap.md{height:32px;padding:0 10px}
.input-wrap.sm{height:24px;padding:0 8px}
.input-wrap:focus-within{border-color:var(--border-default)}
.input-wrap:hover:not(.err):not(.warn){border-color:var(--border-3)}
.input-wrap.err{border-color:var(--border-error)!important}
.input-el{flex:1;background:transparent;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--text-primary);caret-color:var(--text-primary)}
.input-el::placeholder{color:var(--text-tertiary)}
.input-icon{color:var(--icon-secondary);display:flex;align-items:center}
.input-helper{font-size:11px;color:var(--text-tertiary);padding:4px 2px 0;line-height:1.4}
.input-helper.err{color:var(--color-error)}

/* ─── CARD ─── */
.viz-card{
  background:var(--surface-2);border-radius:8px;
  border:1px solid var(--border-0);display:flex;gap:4px;overflow:hidden;
  transition:background var(--ease),border-color var(--ease);
}
.viz-card:hover{background:var(--surface-3);border-color:var(--border-1)}
.card-indent{width:8px;flex-shrink:0}
.card-body{flex:1;min-width:0;padding:10px 8px 10px 0;display:flex;flex-direction:column;gap:3px}
.card-title{font-size:15px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-sub{font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-ts{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--icon-tertiary)}
.card-actions{display:flex;align-items:center;flex-shrink:0;gap:1px;padding-right:4px}
.card-icon-btn{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--icon-secondary);cursor:pointer;transition:background var(--ease),color var(--ease)}
.card-icon-btn:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:400;padding:24px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--surface-3);border:1px solid var(--border-0);border-radius:12px;box-shadow:0 24px 64px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;animation:slideUp .2s ease-out;max-height:calc(100vh - 48px);width:100%}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-box.sm{max-width:360px}.modal-box.md{max-width:480px}.modal-box.lg{max-width:640px}
.modal-head{display:flex;align-items:flex-start;gap:16px;padding:20px 22px;border-bottom:1px solid var(--border-0);flex-shrink:0}
.modal-title{font-size:16px;font-weight:600;color:var(--text-primary);flex:1}
.modal-desc{font-size:13px;color:var(--text-secondary);margin-top:4px;line-height:1.5}
.modal-close{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--icon-secondary);border-radius:6px;cursor:pointer;transition:background var(--ease),color var(--ease)}
.modal-close:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.modal-body-content{padding:20px 22px;overflow-y:auto;flex:1;font-size:13px;color:var(--text-secondary);line-height:1.6}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border-0);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* ─── DROPDOWN ─── */
.dd-wrap{position:relative;display:flex;flex-direction:column;gap:0;width:200px}
.dd-label{font-size:12px;font-weight:500;color:var(--text-secondary);padding:0 0 5px 1px}
.dd-trigger{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:transparent;border:1px solid var(--border-2);
  border-radius:4px 4px 0 0;height:32px;padding:0 10px;
  font-size:14px;font-family:var(--font);color:var(--text-primary);cursor:pointer;
  transition:border-color var(--ease);text-align:left;
}
.dd-trigger:hover{border-color:var(--border-3)}
.dd-trigger.open{border-color:var(--border-default)}
.dd-chevron{color:var(--icon-secondary);flex-shrink:0;transition:transform var(--ease)}
.dd-chevron.up{transform:rotate(180deg)}
.dd-menu{
  position:absolute;top:100%;left:-1px;right:-1px;z-index:100;
  background:var(--surface-3);border:1px solid var(--border-2);
  border-top:none;border-radius:0 0 4px 4px;
  list-style:none;padding:4px 0;
  animation:menuIn .15s ease;overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
@keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-option{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  font-size:13px;color:var(--text-secondary);cursor:pointer;
  transition:background var(--ease),color var(--ease);
}
.dd-option:hover{background:rgba(255,255,255,.07);color:var(--text-primary)}
.dd-option.selected{color:var(--action-primary);background:rgba(52,133,247,.12)}
.dd-check{margin-left:auto;color:var(--action-primary)}

/* ─── TOAST ─── */
.toast{
  display:flex;align-items:flex-start;gap:10px;padding:12px 14px;
  background:var(--surface-3);border:1px solid var(--border-0);
  border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);
  animation:slideInR .2s ease-out;position:relative;overflow:hidden;width:100%;
}
@keyframes slideInR{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.toast::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.toast.success::before{background:var(--color-success)}
.toast.error::before{background:var(--color-error)}
.toast.warning::before{background:var(--color-warning)}
.toast.info::before{background:var(--color-info)}
.toast-icon{flex-shrink:0;display:flex;margin-top:1px}
.toast-content{flex:1;min-width:0}
.toast-title{font-size:13px;font-weight:600;color:var(--text-primary);line-height:1.3}
.toast-desc{font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.3}
.toast-close{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);cursor:pointer;border-radius:4px;transition:background var(--ease),color var(--ease)}
.toast-close:hover{background:rgba(255,255,255,.08);color:var(--text-secondary)}
.toast-stack{display:flex;flex-direction:column;gap:8px;max-width:380px;width:100%}

/* ─── TYPOGRAPHY SHOWCASE ─── */
.type-scale{display:flex;flex-direction:column;border:1px solid var(--border-0);border-radius:8px;overflow:hidden}
.type-row{display:grid;grid-template-columns:220px 1fr;gap:var(--s5);align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-0)}
.type-row:last-child{border-bottom:none}
.type-row:hover{background:rgba(255,255,255,.02)}
.type-meta{display:flex;flex-direction:column;gap:2px}
.type-label{font-size:12px;font-weight:600;color:var(--text-primary)}
.type-measure{font-family:var(--mono);font-size:10px;color:var(--action-primary)}
.type-usage{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.type-sample{color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─── SPACING VIZ ─── */
.spacing-row{display:grid;grid-template-columns:160px 60px 1fr;align-items:center;gap:var(--s4);padding:10px 0;border-bottom:1px solid var(--border-0)}
.spacing-row:first-child{border-top:1px solid var(--border-0)}
.spacing-bar-fill{background:var(--action-primary);height:16px;border-radius:2px;opacity:.7;transition:opacity var(--ease);min-width:4px}
.spacing-row:hover .spacing-bar-fill{opacity:1}

/* ─── RADIUS VIZ ─── */
.radius-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:var(--s3)}
.radius-card{background:var(--surface-1);border:1px solid var(--border-0);border-radius:8px;padding:var(--s4);display:flex;flex-direction:column;align-items:center;gap:var(--s3);text-align:center}
.radius-box{width:52px;height:52px;background:var(--action-primary);opacity:.7}

/* ─── ICON GRID ─── */
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:2px}
.icon-cell{background:var(--surface-1);display:flex;flex-direction:column;align-items:center;gap:7px;padding:16px 8px;transition:background var(--ease)}
.icon-cell:hover{background:var(--surface-2)}
.icon-name{font-family:var(--mono);font-size:9px;color:var(--text-tertiary);text-align:center;word-break:break-word;line-height:1.3}

/* ─── OVERVIEW ─── */
.ov-hero{
  padding:var(--s9) var(--s8) var(--s8);
  background:linear-gradient(135deg,var(--surface-1) 0%,var(--surface-page) 60%);
  border-bottom:1px solid var(--border-0);
}
.ov-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(52,133,247,.1);border:1px solid rgba(52,133,247,.25);
  border-radius:999px;padding:4px 12px;margin-bottom:var(--s5);
  font-size:11px;font-weight:500;color:var(--action-primary);letter-spacing:.02em;
}
.ov-title{font-size:64px;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--text-primary);margin-bottom:var(--s5)}
.ov-sub{font-size:17px;color:var(--text-secondary);line-height:1.65;max-width:560px;margin-bottom:var(--s7)}
.ov-stats{display:flex;gap:var(--s7);border-top:1px solid var(--border-0);padding-top:var(--s6)}
.ov-stat{display:flex;flex-direction:column;gap:4px}
.ov-stat-num{font-size:28px;font-weight:700;color:var(--text-primary);letter-spacing:-.02em;line-height:1}
.ov-stat-lbl{font-size:12px;color:var(--text-tertiary);font-weight:400}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1px;background:var(--border-0)}
.ov-card{
  background:var(--surface-page);padding:var(--s6);
  cursor:pointer;border:none;text-align:left;font-family:var(--font);
  transition:background var(--ease);width:100%;
}
.ov-card:hover{background:var(--surface-1)}
.ov-card-icon{font-size:24px;margin-bottom:var(--s4);display:block}
.ov-card-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
.ov-card-desc{font-size:13px;color:var(--text-tertiary);line-height:1.5}
.ov-section-head{padding:var(--s7) var(--s8) var(--s5)}
.ov-section-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--s4)}
.ov-section-title{font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--text-primary)}

/* ─── NOTIFICATION BADGE ─── */
.notif-badge{display:inline-flex;align-items:center;justify-content:center;font-family:var(--font);font-size:11px;line-height:1;font-weight:400;white-space:nowrap;overflow:hidden}

.notif-badge.nb-secondary{background:var(--surface-3);color:var(--text-secondary)}
.notif-badge.nb-sm{height:13px;padding:0 3px;border-radius:80px}
.notif-badge.nb-md{height:16px;padding:0 4px;border-radius:80px}
.notif-badge.nb-lg{height:20px;padding:0 8px;border-radius:80px}
.notif-badge.sq{border-radius:4px}

/* ─── CALLOUT ─── */
.callout{
  display:flex;gap:var(--s4);padding:var(--s4) var(--s5);
  border-radius:6px;border-left:3px solid;margin:var(--s5) 0;

.callout.info{background:rgba(52,133,247,.06);border-left-color:var(--action-primary)}

.callout-text{font-size:13px;color:var(--text-secondary);line-height:1.6}
.callout-text strong{color:var(--text-primary);font-weight:600}

function PageHero({ eyebrow, title, desc, meta }) {
  return (
    <header className="page-hero">
      {eyebrow && <p className="page-hero-eyebrow">{eyebrow}</p>}
      <h1 className="page-hero-title">{title}</h1>
      {desc && <p className="page-hero-desc">{desc}</p>}
      {meta && (
        <div className="page-hero-meta">
          {meta.map(m => (
            <div key={m.label} className="page-hero-meta-item">
              <span className="page-hero-meta-label">{m.label}</span>
              <span className="page-hero-meta-val">{m.val}</span>
            </div>
          ))}
        </div>
      )}
    </header>
  );
}

function Section({ title, desc, children }) {
  return (
    <section className="ds-section">
      <div className="ds-section-header">
        <h2 className="ds-section-title">{title}</h2>
        {desc && <p className="ds-section-desc">{desc}</p>}
      </div>
      {children}
    </section>
  );
}

function Preview({ preview, code, dark }) {
  const [tab, setTab] = useState('preview');
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(code); setCopied(true); setTimeout(() => setCopied(false), 1600); };
  return (
    <div className="preview-wrap">
      <div className="preview-bar">
        <button className={`preview-tab${tab==='preview'?' active':''}`} onClick={() => setTab('preview')}>Preview</button>
        <button className={`preview-tab${tab==='code'?' active':''}`} onClick={() => setTab('code')}>Code</button>
      </div>
      {tab === 'preview'
        ? <div className={`preview-canvas${dark?' dark':''}`}>{preview}</div>
        : <div className="code-block">
            <div className="code-block-header">
              <span className="code-block-lang">jsx</span>
              <button className={`code-copy-btn${copied?' done':''}`} onClick={copy}>
                {copied ? '✓ Copied' : 'Copy'}
              </button>
            </div>
            <pre className="code-pre"><code>{code}</code></pre>
          </div>
      }
    </div>
  );
}

function PropsTable({ props }) {
  return (
    <div className="props-table-wrap">
      <table>
        <thead><tr><th>Prop</th><th>Type</th><th>Default</th><th>Description</th></tr></thead>
        <tbody>
          {props.map(p => (
            <tr key={p.name}>
              <td><code className="prop-name">{p.name}</code></td>
              <td><code className="prop-type">{p.type}</code></td>
              <td><code className="prop-def">{p.default||'—'}</code></td>
              <td>{p.desc}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function CodeBlock({ code, lang = 'css' }) {
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(code); setCopied(true); setTimeout(() => setCopied(false), 1600); };
  return (
    <div className="code-block">
      <div className="code-block-header">
        <span className="code-block-lang">{lang}</span>
        <button className={`code-copy-btn${copied?' done':''}`} onClick={copy}>{copied ? '✓ Copied' : 'Copy'}</button>
      </div>
      <pre className="code-pre"><code>{code}</code></pre>
    </div>
  );
}

function DoDont({ dos, donts }) {
  return (
    <div className="dodont">
      <div className="do-card">
        <p className="dodont-head">✓ Do</p>
        <ul className="dodont-list">{dos.map((d,i) => <li key={i}>{d}</li>)}</ul>
      </div>
      <div className="dont-card">
        <p className="dodont-head">✕ Don't</p>
        <ul className="dodont-list">{donts.map((d,i) => <li key={i}>{d}</li>)}</ul>
      </div>
    </div>
  );
}

function ColorTile({ label, hex, token, desc }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const cssVar = '--' + token.toLowerCase().replace(/\//g,'-').replace(/\s+/g,'-').replace(/[()%]/g,'');
    navigator.clipboard.writeText(cssVar);
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };
  const isLight = hex.startsWith('#') && hex.length <= 7 && parseInt(hex.slice(1),16) > 0xbbbbbb;
  const hasAlpha = hex.length > 7 || hex.startsWith('rgba');
  return (
    <button className="color-tile" onClick={copy} title={desc}>
      <div
        className={`color-tile-swatch${hasAlpha?' alpha-bg':''}`}
        style={{background: hex}}
      />
      <div className="color-tile-info">
        <span className="color-tile-name">{label}</span>
        <span className="color-tile-hex">{copied ? '✓ Copied!' : hex}</span>
        <span className="color-tile-token">{token}</span>
      </div>
    </button>
  );
}

function GreyRamp() {
  return (
    <div style={{display:'flex',borderRadius:'8px',overflow:'hidden',height:'64px'}}>
      {GREY_RAMP.map(c => {
        const light = parseInt(c.hex.slice(1),16) > 0x999999;
        return (
          <button key={c.n} title={c.hex}
            onClick={() => navigator.clipboard.writeText(c.hex)}
            style={{flex:1,background:c.hex,border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1,transition:'flex .15s ease'}}

}

  footer={<><Button ghost>Cancel</Button>
  <Button variant="danger">Delete</Button></>}
/>`}
          />
        </Section>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   DROPDOWN PAGE
══════════════════════════════════════════════════ */
function DropdownPage() {
  const [v1, setV1] = useState('high');
  const [v2, setV2] = useState('');
  const [o1, setO1] = useState(false);
  const [o2, setO2] = useState(false);
  const r1 = useRef(null), r2 = useRef(null);
  const OPTS1 = [{v:'critical',l:'Critical'},{v:'high',l:'High'},{v:'medium',l:'Medium'},{v:'low',l:'Low'}];
  const OPTS2 = [{v:'ct',l:'CT'},{v:'mri',l:'MRI'},{v:'xr',l:'X-Ray'},{v:'us',l:'Ultrasound'}];
  useEffect(() => {
    const h = e => { if(!r1.current?.contains(e.target)) setO1(false); if(!r2.current?.contains(e.target)) setO2(false); };
    document.addEventListener('mousedown',h);
    return () => document.removeEventListener('mousedown',h);
  },[]);
  const Dd = ({ref2, label, opts, val, setVal, open, setOpen, placeholder='Select…'}) => {
    const sel = opts.find(o => o.v===val);
    return (
      <div ref={ref2} className="dd-wrap">
        {label && <label className="dd-label">{label}</label>}
        <button className={`dd-trigger${open?' open':''}`} onClick={() => setOpen(x=>!x)}>
          <span style={!sel?{color:'var(--text-tertiary)'}:{}}>{sel?sel.l:placeholder}</span>
          <svg className={`dd-chevron${open?' up':''}`} width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M3 4.5l3 3 3-3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
        </button>
        {open && <ul className="dd-menu">
          {opts.map(o => (
            <li key={o.v} className={`dd-option${o.v===val?' selected':''}`} onClick={() => { setVal(o.v); setOpen(false); }}>
              {o.l}
              {o.v===val && <svg className="dd-check" width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l2.5 2.5L10 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>}
            </li>
          ))}
        </ul>}
      </div>
    );
  };
  return (
    <div>
      <PageHero eyebrow="Components" title="Dropdown" desc="Select one option from a list. Opens inline below the trigger with top-radius only styling, closing on selection, outside click, or Escape."/>
      <div className="page-content">
        <Section title="Basic usage">
          <Preview
            preview={<div style={{display:'flex',gap:20,flexWrap:'wrap',alignItems:'flex-start',paddingBottom:120}}>
              <Dd ref2={r1} label="Priority" opts={OPTS1} val={v1} setVal={setV1} open={o1} setOpen={setO1}/>
              <Dd ref2={r2} label="Modality" opts={OPTS2} val={v2} setVal={setV2} open={o2} setOpen={setO2} placeholder="Select modality…"/>
            </div>}
            code={`<Dropdown label="Priority"
  options={[{value:'critical',label:'Critical'},{value:'high',label:'High'}]}
  value={priority} onChange={setPriority}
/>`}
          />
        </Section>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   TOAST PAGE
══════════════════════════════════════════════════ */
const TOAST_ICONS = {
  success: <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#32ab45" opacity=".15"/><circle cx="8" cy="8" r="7" stroke="#32ab45" strokeWidth="1.4"/><path d="M5 8l2 2 4-4" stroke="#32ab45" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  error:   <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#ff586b" opacity=".15"/><circle cx="8" cy="8" r="7" stroke="#ff586b" strokeWidth="1.4"/><path d="M6 6l4 4M10 6l-4 4" stroke="#ff586b" strokeWidth="1.4" strokeLinecap="round"/></svg>,
  warning: <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 2L14.5 13H1.5L8 2z" fill="#f6ad3f" opacity=".15" stroke="#f6ad3f" strokeWidth="1.4" strokeLinejoin="round"/><path d="M8 6v3.5M8 11.5h.01" stroke="#f6ad3f" strokeWidth="1.5" strokeLinecap="round"/></svg>,
  info:    <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#3485f7" opacity=".15"/><circle cx="8" cy="8" r="7" stroke="#3485f7" strokeWidth="1.4"/><path d="M8 7v4.5M8 5h.01" stroke="#3485f7" strokeWidth="1.5" strokeLinecap="round"/></svg>,
};

const TOAST_MSGS = {
  success:{title:'Case assigned',desc:'Dr. Smith has been notified.'},
  error:{title:'Connection failed',desc:'Unable to reach the server.'},
  warning:{title:'Session expiring',desc:'Logged out in 5 minutes.'},
  info:{title:'New case available',desc:'A high-priority case was added.'},
};

function ToastItem({ variant, title, desc, onClose }) {
  useEffect(() => { const t = setTimeout(() => onClose?.(), 5000); return () => clearTimeout(t); },[]);
  return (
    <div className={`toast ${variant}`}>
      <span className="toast-icon">{TOAST_ICONS[variant]}</span>
      <div className="toast-content">
        <p className="toast-title">{title}</p>
        <p className="toast-desc">{desc}</p>
      </div>
      <button className="toast-close" onClick={onClose}>
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M9 3L3 9M3 3l6 6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
      </button>
    </div>
  );
}

function ToastPage() {
  const [toasts, setToasts] = useState([]);
  const add = v => setToasts(t => [...t, {id:Date.now(), v}]);
  const rm = id => setToasts(t => t.filter(x => x.id !== id));
  return (
    <div>
      <PageHero eyebrow="Components" title="Toast" desc="Transient non-blocking notifications. Auto-dismiss after 5s. Use for system feedback — not for actions requiring a response."/>
      <div className="page-content">
        <Section title="Live demo" desc="Trigger toast notifications and see them appear.">
          <Preview
            preview={<div style={{display:'flex',flexDirection:'column',gap:16,width:'100%'}}>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {['success','error','warning','info'].map(v => (
                  <button key={v} className="btn sm secondary" style={{textTransform:'capitalize'}} onClick={() => add(v)}>{v}</button>
                ))}
              </div>
              <div className="toast-stack">
                {toasts.map(t => <ToastItem key={t.id} variant={t.v} {...TOAST_MSGS[t.v]} onClose={() => rm(t.id)}/>)}
              </div>
            </div>}
            code={`<Toast variant="success" title="Case assigned"
  description="Dr. Smith has been notified."
  onClose={() => setVisible(false)}
/>`}
          />
        </Section>

        <Section title="All variants static">
          <div className="toast-stack" style={{maxWidth:400}}>
            {['success','error','warning','info'].map(v => (
              <ToastItem key={v} variant={v} {...TOAST_MSGS[v]} onClose={()=>{}}/>
            ))}
          </div>
        </Section>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState('overview');
  return <Shell page={page} setPage={setPage}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
